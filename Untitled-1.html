<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    overflow:hidden;
}

.card{
    text-align:center;
    padding:40px;
    width:90%;
    max-width:500px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);

    border-radius:25px;
    color:white;

    animation:float 4s ease-in-out infinite;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

p{
    opacity:.8;
    margin-bottom:25px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:1rem;

    background:white;
    color:#111827;

    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.message{
    margin-top:25px;
    opacity:0;
    transform:translateY(20px);
    transition:1s;
}

.message.show{
    opacity:1;
    transform:translateY(0);
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

.bg-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
}

.c1{
    width:250px;
    height:250px;
    background:#ff4d8d;
    top:-50px;
    left:-50px;
}

.c2{
    width:300px;
    height:300px;
    background:#4f46e5;
    bottom:-80px;
    right:-80px;
}
</style>
</head>
<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="card">

    <h1>🎂 Happy Birthday</h1>

    <p>I made something special for you.</p>

    <button onclick="openGift()">
        Open Your Gift 🎁
    </button>

    <div id="msg" class="message">
        <h2>✨ Happy Birthday!</h2>
        <br>
        <p>
        YOOOO!! HAPPY BIRTHDAY! 
        Thanks wei , hang orang pertama(kawan) yang aku wish guna website
        </p>
    </div>

</div>

<script>
function openGift(){

    confetti({
        particleCount:150,
        spread:120,
        origin:{y:0.6}
    });

    document.getElementById("msg").classList.add("show");
}
</script>


</body>
</html>
