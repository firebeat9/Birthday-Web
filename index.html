<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ff4d8d, #6a5cff, #00c6ff, #ffcc00);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

.card {
    text-align: center;
    background: rgba(255,255,255,0.12);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    color: white;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
    z-index: 2;
    position: relative;
}

h1 {
    font-size: 2.3rem;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
}

.gift {
    font-size: 60px;
    cursor: pointer;
    transition: transform 0.3s;
}

.gift:hover {
    transform: scale(1.2);
}

.message {
    margin-top: 15px;
    min-height: 40px;
}

/* 🎈 BALLOONS */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 50px;
    border-radius: 50%;
    animation: floatUp 8s linear infinite;
    opacity: 0.8;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
    }
    100% {
        transform: translateY(-120vh);
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="gift" onclick="openGift()">🎁</div>
    <h1>Happy Birthday 🎉</h1>
    <div class="message" id="text"></div>
</div>

<script>
const message = "Happy Birthday Auni 🎉 Hope your day is full of happiness, success, and amazing memories 🎈";

let i = 0;

function typeText(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 45);
    }
}

// 🎈 CREATE BALLOONS
function createBalloons(){
    for(let i=0;i<12;i++){
        let b = document.createElement("div");
        b.className = "balloon";

        b.style.left = Math.random()*100 + "vw";
        b.style.background = randomColor();
        b.style.animationDuration = (5 + Math.random()*5) + "s";

        document.body.appendChild(b);

        setTimeout(()=>{ b.remove(); }, 10000);
    }
}

function randomColor(){
    const colors = ["#ff4d8d","#6a5cff","#00c6ff","#ffcc00","#00ff88"];
    return colors[Math.floor(Math.random()*colors.length)];
}

function openGift(){
    confetti({
        particleCount: 300,
        spread: 140,
        origin: { y: 0.6 }
    });

    createBalloons();

    document.getElementById("text").innerHTML = "";
    i = 0;
    typeText();
}
</script>

</body>
</html>
