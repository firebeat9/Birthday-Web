<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ff4d8d, #ff5cc9, #cd7da8, #a95b9c);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

/* CARD */
.card {
    text-align: center;
    background: rgba(255,255,255,0.12);
    padding: 40px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    color: white;
    width: 90%;
    max-width: 520px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
    z-index: 10;
}

/* YOUR NAME + TIKTOK */
.creator {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    opacity: 0.7;
}

.creator span {
    font-weight: bold;
}

/* GIFT */
.gift {
    font-size: 85px;
    cursor: pointer;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-12px);}
}

.clue {
    font-size: 14px;
    opacity: 0.8;
    margin-top: 5px;
}

.message {
    margin-top: 20px;
    min-height: 40px;
    font-size: 18px;
}

/* BALLOON */
.balloon {
    position: absolute;
    width: 40px;
    height: 55px;
    border-radius: 50%;
    bottom: -120px;
    will-change: transform;
    animation: floatUp linear forwards;
}

.balloon::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 12px;
    width: 8px;
    height: 14px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
}

.balloon::after {
    content: "";
    position: absolute;
    bottom: -35px;
    left: 50%;
    width: 2px;
    height: 35px;
    background: rgba(255,255,255,0.5);
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_8b7a7c6d4e.mp3?filename=happy-birthday-to-you-piano-version-124998.mp3">
</audio>

<div class="card">

    <div class="gift" onclick="openGift()">🎁</div>
    <div class="clue">Click the gift 🎁</div>

    <h1>Happy Birthday 🎉</h1>
    <div class="message" id="text"></div>

    <!-- 👇 YOUR NAME + TIKTOK -->
    <div class="creator">
        Made by <span>Arif</span> • TikTok: <span>@69diekatzee</span>
    </div>

</div>

<script>

let canClick = true;
let musicStarted = false;
let balloonCount = 0;
const MAX_BALLOONS = 18;

function startMusic(){
    if(!musicStarted){
        document.getElementById("bgm").play();
        musicStarted = true;
    }
}

const message = "Happy Birthday Auni 🎉 Hang classmate pertama aku wish Birthday guna Website💖 and suprisingly aku sempat buat web ni dlm masa 1 malam, so please rate Website ni, nanti aku bagi la RM10...oh ye boleh tak follow tiktok aku, please";
let i = 0;

function typeText(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 40);
    }
}

function createBalloon(){

    if(balloonCount >= MAX_BALLOONS) return;

    balloonCount++;

    const b = document.createElement("div");
    b.className = "balloon";

    b.style.left = Math.random() * 100 + "vw";
    b.style.background = randomColor();

    let duration = 5 + Math.random() * 4;
    b.style.animationDuration = duration + "s";

    document.body.appendChild(b);

    setTimeout(() => {
        b.remove();
        balloonCount--;
    }, duration * 1000);
}

function randomColor(){
    const colors = ["#ff4d8d","#6a5cff","#00c6ff","#ffcc00","#00ff88","#ff6b6b"];
    return colors[Math.floor(Math.random() * colors.length)];
}

function openGift(){

    if(!canClick) return;
    canClick = false;

    startMusic();

    confetti({
        particleCount: 280,
        spread: 150,
        origin: { y: 0.6 }
    });

    for(let i=0;i<10;i++){
        setTimeout(createBalloon, i * 180);
    }

    document.getElementById("text").innerHTML = "";
    i = 0;
    typeText();

    setTimeout(() => {
        canClick = true;
    }, 3000);
}

</script>

</body>
</html>
