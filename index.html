<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ff4d8d, #6a5cff, #00c6ff, #ffcc00);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

/* 🌟 GLASS CARD */
.card {
    text-align: center;
    background: rgba(255,255,255,0.12);
    padding: 40px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    color: white;
    width: 90%;
    max-width: 520px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
    z-index: 10;
}

h1 {
    font-size: 2.4rem;
    margin-bottom: 10px;
}

.gift {
    font-size: 70px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.gift:hover {
    transform: scale(1.15) rotate(-5deg);
}

.message {
    margin-top: 20px;
    min-height: 40px;
    font-size: 18px;
    opacity: 0.9;
}

/* 🎈 REALISTIC BALLOON */
.balloon {
    position: absolute;
    width: 45px;
    height: 60px;
    border-radius: 50%;
    bottom: -120px;
    animation: floatUp linear forwards;
}

/* shine highlight */
.balloon::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 12px;
    width: 10px;
    height: 18px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
}

/* string */
.balloon::after {
    content: "";
    position: absolute;
    bottom: -40px;
    left: 50%;
    width: 2px;
    height: 40px;
    background: rgba(255,255,255,0.6);
}

@keyframes floatUp {
    0% {
        transform: translateY(0) translateX(0) rotate(0deg);
    }
    50% {
        transform: translateY(-50vh) translateX(20px) rotate(10deg);
    }
    100% {
        transform: translateY(-110vh) translateX(-20px) rotate(-10deg);
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="gift" onclick="openGift()">🎁</div>
    <h1>Happy Birthday 🎉</h1>
    <div class="message" id="text"></div>
</div>

<script>
const message = "Happy Birthday Auni 🎉 Wishing you happiness, success, and beautiful memories always 💖";

let i = 0;

function typeText(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 40);
    }
}

/* 🎈 BETTER BALLOONS */
function createBalloon(){
    const b = document.createElement("div");
    b.className = "balloon";

    b.style.left = Math.random() * 100 + "vw";
    b.style.background = randomColor();

    let duration = 6 + Math.random() * 6;
    b.style.animationDuration = duration + "s";

    document.body.appendChild(b);

    setTimeout(() => b.remove(), duration * 1000);
}

function randomColor(){
    const colors = [
        "#ff4d8d",
        "#6a5cff",
        "#00c6ff",
        "#ffcc00",
        "#00ff88",
        "#ff6b6b"
    ];
    return colors[Math.floor(Math.random() * colors.length)];
}

/* 🎉 OPEN GIFT */
function openGift(){

    confetti({
        particleCount: 350,
        spread: 160,
        origin: { y: 0.6 }
    });

    // burst balloons
    for(let i=0;i<18;i++){
        setTimeout(createBalloon, i * 120);
    }

    document.getElementById("text").innerHTML = "";
    i = 0;
    typeText();
}
</script>

</body>
</html>
